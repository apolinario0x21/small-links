# Ambiente LOCAL de observabilidade (desenvolvimento). Não faz parte do
# deploy. Sobe Prometheus + Grafana e se conecta à rede small-links-net
# criada pelo docker-compose.yml principal (referenciada como external).
services:
  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - small-links-net

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - small-links-net

networks:
  small-links-net:
    external: true

volumes:
  prometheus_data:
  grafana_data:
