name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # go-version-file instalaria EXATAMENTE a versão da linha `go` do go.mod
      # (1.25.0), cuja stdlib acumula CVEs já corrigidos nos patches — o
      # govulncheck acusa dezenas deles. Pinar a linha 1.25.x com check-latest
      # garante sempre o último patch.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Arquivos fora do padrão gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

      # Detector de corrida: o Recorder de cliques roda em worker próprio.
      - name: go test -race
        run: go test -race ./...

  # Integração: repositório e API contra um Postgres real. Sem este job, as
  # invariantes que vivem no SQL (dedup, soft delete, NULLIF) só seriam
  # verificadas contra mocks — que apenas repetem a query que escrevemos.
  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smalllinks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true

      # -p 1: os dois pacotes de integração compartilham o banco e dão
      # TRUNCATE nas mesmas tabelas — serializar evita a corrida latente.
      - name: go test (integração)
        env:
          SMALL_LINKS_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/smalllinks_test?sslmode=disable
        run: go test -p 1 -count=1 ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # go-version-file instalaria EXATAMENTE a versão da linha `go` do go.mod
      # (1.25.0), cuja stdlib acumula CVEs já corrigidos nos patches — o
      # govulncheck acusa dezenas deles. Pinar a linha 1.25.x com check-latest
      # garante sempre o último patch.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true

      # A ação v8 é a que instala a linha v2 do golangci-lint — a v6 resolve
      # "latest" para a v1, que não lê o .golangci.yml (version: "2") e é
      # compilada com Go 1.24, abaixo do go.mod (1.25).
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

      # Vulnerabilidades conhecidas nas dependências.
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      # Padrões inseguros no código (docs/ é gerado pelo swag).
      - name: gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -exclude-dir=docs ./...
