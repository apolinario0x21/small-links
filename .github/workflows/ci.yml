name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Arquivos fora do padrão gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

      # Detector de corrida: o Recorder de cliques roda em worker próprio.
      - name: go test -race
        run: go test -race ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # A ação v8 é a que instala a linha v2 do golangci-lint — a v6 resolve
      # "latest" para a v1, que não lê o .golangci.yml (version: "2") e é
      # compilada com Go 1.24, abaixo do go.mod (1.25).
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

      # Vulnerabilidades conhecidas nas dependências.
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      # Padrões inseguros no código (docs/ é gerado pelo swag).
      - name: gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -exclude-dir=docs ./...
