global:
  scrape_interval: 15s

scrape_configs:
  # Instância local (docker compose up).
  - job_name: small-links
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8080"]

  # Produção no Render. O free tier hiberna quando ocioso, então este alvo
  # aparece DOWN em períodos sem tráfego — comportamento esperado.
  - job_name: small-links-prod
    scheme: https
    metrics_path: /metrics
    scrape_interval: 60s
    static_configs:
      - targets: ["small-links.onrender.com"]
