apiVersion: 1

# Remove qualquer datasource "Prometheus" pré-existente antes de recriar.
# Sem isto, um volume grafana_data de uma execução anterior pode manter um
# datasource com uid aleatório; provisionar por nome NÃO troca o uid, e os
# painéis (que referenciam uid: prometheus) ficariam órfãos/vazios.
deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  - name: Prometheus
    type: prometheus
    # uid fixo e explícito: os painéis do dashboard referenciam este mesmo
    # uid, então o Grafana vincula tudo sozinho, sem intervenção manual.
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
