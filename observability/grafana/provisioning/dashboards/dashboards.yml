apiVersion: 1

providers:
  - name: small-links
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      # Caminho onde os JSONs de dashboard são montados no container
      # (ver docker-compose.observability.yml). Deve casar exatamente.
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
