<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="robots" content="noindex, nofollow">
  <title>small-links — link protegido</title>
  <style nonce="{{.Nonce}}">
    :root {
      --bg: #0b0e14;
      --panel: #11161f;
      --border: #232b39;
      --fg: #d7dee8;
      --muted: #7d8799;
      --accent: #4ade80;
      --danger: #f87171;
      --radius: 10px;
      --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--mono);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      padding: 1.25rem;
    }
    main { width: 100%; max-width: 420px; margin: auto; }
    h1 { font-size: 1.5rem; margin: 0; letter-spacing: -0.5px; }
    h1 .prompt { color: var(--accent); }
    p.lead { color: var(--muted); margin: 0.35rem 0 1.5rem; font-size: 0.9rem; }
    form {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem;
    }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--fg);
      font-family: var(--mono);
      font-size: 1rem;
      padding: 0.7rem 0.8rem;
    }
    input:focus { outline: none; border-color: var(--accent); }
    button {
      width: 100%;
      margin-top: 0.9rem;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #06210f;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 1rem;
    }
    .error {
      color: var(--danger);
      font-size: 0.85rem;
      margin: 0 0 0.9rem;
    }
    footer { color: var(--muted); font-size: 0.75rem; margin-top: 1.2rem; text-align: center; }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1><span class="prompt">$</span> link protegido</h1>
    <p class="lead">Este link exige senha para ser aberto.</p>
    <form method="post" action="{{.Action}}" autocomplete="off">
      {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
      <label for="password">senha</label>
      <input id="password" name="password" type="password" autofocus required minlength="4">
      <button type="submit">abrir link</button>
    </form>
    <footer><a href="/">small-links</a></footer>
  </main>
</body>
</html>
